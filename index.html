<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela login Verlandio</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/mediaqueries.css">
    
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem-vindo(a)! Faça seu login para acessar o ambiente.</p>

                <form action="login.php" method="post">
                    <div class="campo">
                        <i class="material-icons">account_circle</i>
                        <label for="ilogin"></label>
                        <input type="email" name="email" id="ilogin" placeholder="seu email" required maxlength="30">
                    </div>

                    <div class="campo">
                        <i class="material-icons">lock</i>
                        <label for="isenha"></label>
                        <input type="password" name="senha" id="isenha" placeholder="sua senha" required minlength="4" maxlength="8">
                    </div>
                    <input type="submit" value="Login">
                    <a href="esqueciasenha.html" class="botao">Esqueci minha senha <i class="material-icons" >help_outline</i></a>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
